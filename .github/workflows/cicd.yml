name: CI/CD Pipeline

# 1. Define the triggering events
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 2. Continuous Integration Job (Runs on PRs and Pushes)
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Setup Node.js environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Check code formatting/linting
      run: npm run lint

    - name: Run automated test suite
      run: npm test

  # 3. Continuous Deployment Job (Only runs on main branch after testing passes)
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test # Enforces sequential order
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Deploy application
      env:
        DEPLOY_TOKEN: ${{ secrets.PRODUCTION_DEPLOY_TOKEN }}
      run: |
        echo "Deploying production build..."
        # Add your production deployment script or cloud provider integration here
